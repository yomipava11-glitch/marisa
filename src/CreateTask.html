<html class="dark"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#00a651",
                        "background-light": "#f7f6f8",
                        "background-dark": "#191022",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glass-input {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .bg-mesh {
            background-color: #191022;
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 166, 81, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 166, 81, 0.1) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(59, 130, 246, 0.1) 0px, transparent 50%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-screen w-full flex-col bg-mesh overflow-hidden">
<!-- Main Scrollable Content Area -->
<div class="flex-1 overflow-y-auto px-4 pb-32 pt-6">
<!-- Top Navigation Bar -->
<div class="flex items-center justify-between mb-8">
<button class="flex size-10 items-center justify-center rounded-full glass-panel text-slate-100 hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
<h2 class="text-slate-100 text-lg font-bold leading-tight tracking-tight">Create New Task</h2>
<div class="w-10"></div> <!-- Spacer for symmetry -->
</div>
<!-- Task Title Input -->
<div class="space-y-2 mb-6">
<label class="text-slate-400 text-xs font-bold uppercase tracking-widest px-1">Task Title</label>
<div class="glass-input rounded-xl px-4 py-1">
<input class="w-full bg-transparent border-none text-slate-100 placeholder:text-slate-500 focus:ring-0 py-3 text-base" placeholder="Design system audit" type="text"/>
</div>
</div>
<!-- Description Input with AI button -->
<div class="space-y-2 mb-6">
<div class="flex items-center justify-between px-1">
<label class="text-slate-400 text-xs font-bold uppercase tracking-widest">Description</label>
<button class="flex items-center gap-1.5 text-primary text-xs font-bold">
<span class="material-symbols-outlined text-sm">auto_awesome</span>
                        AI Assist
                    </button>
</div>
<div class="glass-input rounded-xl px-4 py-3">
<textarea class="w-full bg-transparent border-none text-slate-100 placeholder:text-slate-500 focus:ring-0 resize-none p-0 text-base" placeholder="Define the core components for the new mobile framework..." rows="3"></textarea>
</div>
</div>
<!-- Task Type Toggle -->
<div class="space-y-2 mb-6">
<label class="text-slate-400 text-xs font-bold uppercase tracking-widest px-1">Task Type</label>
<div class="flex glass-input p-1 rounded-xl">
<label class="flex-1 cursor-pointer">
<input class="sr-only peer" name="task_type" type="radio" value="individual"/>
<div class="flex items-center justify-center h-10 rounded-lg text-slate-400 peer-checked:bg-primary peer-checked:text-white transition-all">
<span class="text-sm font-semibold">Individual</span>
</div>
</label>
<label class="flex-1 cursor-pointer">
<input checked="" class="sr-only peer" name="task_type" type="radio" value="collective"/>
<div class="flex items-center justify-center h-10 rounded-lg text-slate-400 peer-checked:bg-primary peer-checked:text-white transition-all">
<span class="text-sm font-semibold">Collective</span>
</div>
</label>
</div>
</div>
<!-- Collaborative Section (Visible when Collective is chosen) -->
<div class="space-y-4 mb-6">
<label class="text-slate-400 text-xs font-bold uppercase tracking-widest px-1">Team Members</label>
<div class="flex flex-wrap gap-3">
<div class="relative group">
<img class="size-12 rounded-full border-2 border-primary ring-4 ring-primary/10" data-alt="User avatar profile picture" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDWpv60S2WjYKOH-VHJFY6xnWCTlukxbfAH9nID3XIQ_gOLUuJ2OQTW9UHpnTa04dYHQGH_jXXYh0hYyitKau4xpY9rbF0ICv3c05XJJG-q_8SjMT0_LfubLy3xbcXW-icKXtjxl3tIFCrKL5IuDF-0Q08JDNCZ4XrPtYJy0RYFCyijVIvzP6_Ao1JTfGej5nZJk_z0lXHwoU5dgVAoVVuE4rWuEASD8fWUKDb0797QPziKpvtXkz1RsEsbXVDTmCvASDMN_MBcVODK"/>
</div>
<div class="relative">
<img class="size-12 rounded-full border-2 border-transparent" data-alt="User avatar female portrait" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCudUl5GV25_LbvkHi1Yw-Hxpsz8jANbTq1qVFMFbnObHx4dK0Vomn_woQA0glEhFDJZgFNgIDklFjyGMbdHZc54KaYYHOTOzn5oDhZWUjnb5UUYuKErtepIQKNumMuvxkUsV2evSxkloOpBa6qTqYToCU-1uz-VGorPGSm41vounEnFfizXl-mhSq98X79oKm7153JeMLKmwwb3sAFT76MIpVfQVzbYEv79CVNKh3dhIR1MIqGKM1R2z9ZR21mTJvAcu8I5OHdOewx"/>
</div>
<div class="relative">
<img class="size-12 rounded-full border-2 border-transparent" data-alt="User avatar male portrait" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCq9cS6wpTn_qmUIwGTYjfpjXEZt13Hg3in3oOgxR3qoULOxAKltDt7CpW_0hDPbi0SiIYukaRG3S6xfLNexeKW1Ko2QrE8kNVAMs66hgh4318n4-Kmc1ThA22jqiI5DRO_LKg6ORgWxW9V9wJr3cyf_Eyqdd3jBTJmCCGovFjzP-VC0nHXCWkqSuRrtGgRQci7Eyf3ELexcR4XukE58aoW82902EDTBwOgL3UbrJjWGZWDCmkHQ_kFH5royPrAyQeoqh-2Fi3n1jVE"/>
</div>
<button class="size-12 rounded-full glass-panel border-dashed border-slate-500 flex items-center justify-center text-slate-400 hover:text-white hover:border-primary transition-all">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</div>
<!-- Date & Time Picker -->
<div class="space-y-2 mb-10">
<label class="text-slate-400 text-xs font-bold uppercase tracking-widest px-1">Due Date</label>
<div class="flex gap-3">
<div class="flex-1 glass-input rounded-xl px-4 py-3 flex items-center gap-3">
<span class="material-symbols-outlined text-primary">calendar_today</span>
<div class="flex flex-col">
<span class="text-[10px] text-slate-500 font-bold uppercase">Date</span>
<span class="text-sm text-slate-100">Oct 24, 2024</span>
</div>
</div>
<div class="flex-1 glass-input rounded-xl px-4 py-3 flex items-center gap-3">
<span class="material-symbols-outlined text-primary">schedule</span>
<div class="flex flex-col">
<span class="text-[10px] text-slate-500 font-bold uppercase">Time</span>
<span class="text-sm text-slate-100">10:00 AM</span>
</div>
</div>
</div>
</div>
</div>
<!-- Sticky Bottom Button Area -->
<div class="absolute bottom-0 left-0 right-0 p-6 pb-10 bg-gradient-to-t from-background-dark via-background-dark/80 to-transparent">
<button class="w-full h-16 bg-gradient-to-r from-primary to-blue-500 rounded-2xl flex items-center justify-center gap-2 shadow-[0_8px_32px_rgba(0, 166, 81,0.4)] hover:scale-[1.02] active:scale-[0.98] transition-all">
<span class="text-white font-bold text-lg">Create Task</span>
<span class="material-symbols-outlined text-white">arrow_forward</span>
</button>
</div>
<!-- iOS Home Indicator Overlay -->
<div class="absolute bottom-2 left-1/2 -translate-x-1/2 w-32 h-1 bg-white/20 rounded-full"></div>
</div>
</body></html>
